spring:
  config:
    import: optional:file:.env[.properties]

  application:
    name: inventario

  servlet:
    multipart:
      max-file-size: 2MB
      max-request-size: 2MB

  datasource:
    url: ${DATABASE_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        default_schema: core
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

server:
  port: ${PORT}

consumo:
  ml:
    url: ${CONSUMO_ML_URL}

security:
  jwt:
    secret-key: ${JWT_SECRET_KEY}
    expiration-minutes: ${JWT_EXPIRATION_MINUTES}

spring.ai:
  openai:
    api-key: ${GROQ_API_KEY}
    base-url: ${GROQ_BASE_URL}
    chat:
      options:
        model: ${AI_MODEL}
        temperature: ${AI_TEMPERATURE}

inventario:
  chat:
    session-retention-days: 15

app:
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS}
  frontend:
    base-url: ${APP_FRONTEND_BASE_URL}
  uploads:
    items-path: ${APP_UPLOADS_ITEMS_PATH}
    items-public-base-url: ${APP_UPLOADS_ITEMS_PUBLIC_BASE_URL}
