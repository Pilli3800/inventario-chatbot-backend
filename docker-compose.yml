services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    image: ${BACKEND_IMAGE}
    pull_policy: always
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8080:8080"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      DATABASE_URL: jdbc:postgresql://db:5432/${POSTGRES_DB}
      DB_USERNAME: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      CONSUMO_ML_URL: ${CONSUMO_ML_URL}
      APP_FRONTEND_BASE_URL: ${APP_FRONTEND_BASE_URL}
      APP_CORS_ALLOWED_ORIGINS: ${APP_CORS_ALLOWED_ORIGINS}
      APP_UPLOADS_ITEMS_PATH: ${APP_UPLOADS_ITEMS_PATH}
      APP_UPLOADS_ITEMS_PUBLIC_BASE_URL: ${APP_UPLOADS_ITEMS_PUBLIC_BASE_URL}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      JWT_EXPIRATION_MINUTES: ${JWT_EXPIRATION_MINUTES}
      GROQ_API_KEY: ${GROQ_API_KEY}
      GROQ_BASE_URL: ${GROQ_BASE_URL}
      AI_MODEL: ${AI_MODEL}
      AI_TEMPERATURE: ${AI_TEMPERATURE}
    volumes:
      - ./uploads:/app/uploads

volumes:
  postgres_data:

networks:
  inventario_ia:
    external: true
    name: inventario-ia_default